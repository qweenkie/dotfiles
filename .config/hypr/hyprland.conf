source = ~/.config/hypr/plugins.conf
source = ~/.config/hypr/rules.conf

 #~#~#~#~#~#~#
 # AUTOSTART #
 #~#~#~#~#~#~#


exec-once = systemctl --user start xdg-desktop-portal-hyprland
exec-once = systemctl --user start hyprpolkitagent
exec-once = ~/.config/hypr/scripts/wallpapers
exec-once = hypridle
exec-once = hyprpm reload
exec-once = dunst
exec-once = waybar
exec-once = steam -silent
exec-once = Telegram -startintray
exec-once = signal-desktop --start-in-tray
exec-once = webcord --start-minimized


 #~#~#~#~#~#~#
 # VARIABLES #
 #~#~#~#~#~#~#

general {
    gaps_in = 2 # Gaps between windows
    gaps_out = 0 # Padding against the edges of the screen

    border_size = 2
    col.active_border = rgb(7da9c7)
    col.inactive_border = rgb(303238)

    allow_tearing = true # Unlocks VSync for fullscreen apps
}

decoration {
    rounding = 5

    # Just optimizing. You can barely see itl
    blur:enabled = false
    shadow:enabled = false
}

animations {
    #~#~#~#  NAME     X0    Y0    X1    Y1
    bezier = cubicIO, 0.65, 0,    0.35, 1
    bezier = expoI,   0.7,  0,    0.84, 0
    bezier = expoO,   0.16, 1,    0.3,  1
    bezier = linear,  0,    0,    1,    1
    bezier = over,    0.34, 1.56, 0.64, 1  # Slightly overshoot, then come back

    #~#~#~#~#   NAME              ON/OFF SPEED CURVE   [STYLE]
    animation = global,           1,     1,    default

    animation = windowsIn,        1,     0.7,  expoO
    animation = windowsOut,       1,     1.2,  expoO
    animation = windowsMove,      1,     1.5,  over

    animation = fade,             1,     1.7,  linear
    animation = workspaces,       1,     0.7,  expoI,  slidefade
    animation = specialWorkspace, 1,     0.7,  expoI,  fade
}

input {
    kb_layout = us,ru,ua
    kb_options = grp:shift_caps_toggle,caps:escape,fkeys:basic_13-24 # Enable support for keys F13-24 (for scripting purposes)

    force_no_accel = true
    focus_on_close = 1
}

misc {
    disable_hyprland_logo = true
    vrr = 1 # Keep GSync (Adaptive Sync) on
    middle_click_paste = false # Disable pasting with middle click
}
xwayland:force_zero_scaling = true # Help with pixelation on XWayland

# Disable the rare, but annoying popups
ecosystem {
    no_update_news = true
    no_donation_nag = true
}


 #~#~#~#~#
 # BINDS #
 #~#~#~#~#

# System windgets (menus, screenshots, color picker)
bind = SUPER,       Space,  exec, pkill rofi || rofi -show drun
bind = SUPER,       Escape, exec, pkill rofi || rofi -show 'Power Menu' -modi 'Power Menu:~/.config/hypr/scripts/powermenu' -theme-str 'listview {lines: 5;}'
bind = CTRL,        Print,  exec, pkill grim || grim -g "$(slurp)" ~/screenshots/$(date +'%d%m%Y-%H:%M:%S').png
bind = SHIFT,       Print,  exec, pkill grim || grim -g "$(slurp)" - | wl-copy
bind = CTRL_SHIFT,  Print,  exec, pkill grim || grim -g "$(slurp)" - | tee ~/Screenshots/$(date +'%d%m%Y-%H:%M:%S').png | wl-copy
bind = SUPER,       P,      exec, pkill hyprpicker || hyprpicker -al
bind = SUPER SHIFT, Space,  exec, pkill waybar || waybar

# Frequently used apps
bind = SUPER, Return, exec, foot
bind = SUPER, T,      exec, foot btop
bind = SUPER, X,      exec, firefox

# Windows
bind = SUPER, W, killactive # Close active window
bind = SUPER, F, togglefloating # Toggle between floating or tiling

bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r

# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Special workspace
bind = SUPER,       S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic # Move active window to special workspace

# Mouse binds
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow # Resize the window with Super+RMB

# Audio controls
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume      @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = ,XF86AudioNext,        exec, playerctl next
bindl  = ,XF86AudioPause,       exec, playerctl play-pause
bindl  = ,XF86AudioPlay,        exec, playerctl play-pause
bindl  = ,XF86AudioPrev,        exec, playerctl previous

# Brightness controls (laptops only)
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-


 #~#~#~#~#~#~#~#
 # ENVIRONMENT #
 #~#~#~#~#~#~#~#

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Cursor size and theme
env = XCURSOR_SIZE,28
env = HYPRCURSOR_SIZE,28
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_THEME,Bibata-Modern-Ice

# Fix some scaling issues on higher resolutions
env = GDK_SCALE,1
env = QT_SCALE_FACTOR,1

# XWayland & legacy support
env = MOZ_ENABLE_WAYLAND,1 # Firefox native Wayland
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = ELECTRON_OZONE_PLATFORM_HINT,auto # Fix tearing for Electron apps on XWayland

# Some QT stuff
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1


 #~#~#~#~#~#
 # MONITOR #
 #~#~#~#~#~#

monitor = ,2560x1440@165,0x0,1
